databases:
  - name: mockmate-db
    databaseName: mockmate
    user: mockmate
    plan: free

services:
  - type: web
    name: mockmate-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT app.main:app
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mockmate-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://replace-with-your-vercel-domain.vercel.app
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
