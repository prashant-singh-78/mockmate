services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mockmate
      POSTGRES_USER: mockmate
      POSTGRES_PASSWORD: mockmate_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockmate"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://mockmate:mockmate_local@db:5432/mockmate
      SECRET_KEY: local-only-change-before-production
      FRONTEND_URL: http://localhost:5173
      COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:

